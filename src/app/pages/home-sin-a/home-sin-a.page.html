    <ion-toolbar>

        <img alt="Silhouette of a person's head" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
      </ion-avatar>
      <ion-title> {{usuario}}</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content class="ion-padding">
    <ion-list>
      <ion-item>

<div class="ion-page" id="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-menu-button>
          <ion-avatar>
            <img alt="Silhouette of a person's head" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
          </ion-avatar>
        </ion-menu-button>
      </ion-buttons>
      <ion-title>Bienvenido {{usuario}}</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-content>
    <div class="wrapper">
      <div class="ion-activatable ripple-parent custom-parent rectangle"  routerLink="/pro-v">
        <p class="para">Buscar viaje</p> <img class="imgn" src="../../../assets/img/auto_a-removebg-preview.png"
          alt=""><ion-ripple-effect> </ion-ripple-effect>

      </div>

      <div class="ion-activatable ripple-parent custom-parent rectangle" routerLink="/v-viaje">
        <p class="para">Ver viajes</p> <img class="imgn" src="../../../assets/img/agenda_r.png"
          alt=""><ion-ripple-effect> </ion-ripple-effect>

      </div>

      <div class="ion-activatable ripple-parent custom-parent rectangle" routerLink="/cancelar-v">
        <p class="para">Cancelar viajes</p> <img class="imgn" src="../../../assets/img/cancelar_4-removebg-preview.png "
          alt=""><ion-ripple-effect></ion-ripple-effect>
